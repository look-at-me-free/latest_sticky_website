<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Manga Archive</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Reggae+One&family=Rock+Salt&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#07070a;
  --ink:rgba(255,255,255,.9);
  --muted:rgba(255,255,255,.55);
  --panel:rgba(255,255,255,.06);
  --stroke:rgba(255,255,255,.14);
  --radius:18px;
  --shadow:0 20px 60px rgba(0,0,0,.7);

  --railW:min(240px,22vw);
  --gap:18px;
}

*{ box-sizing:border-box; }

body{
  margin:0;
  background:
    radial-gradient(900px 500px at 15% 0%, rgba(255,255,255,.06), transparent 60%),
    radial-gradient(800px 550px at 85% 15%, rgba(255,255,255,.05), transparent 55%),
    var(--bg);
  color:var(--ink);
  font-family:Inter,system-ui;
}

.hero{
  text-align:center;
  padding:44px 16px 18px;
  border-bottom:1px solid var(--stroke);
  background:
    linear-gradient(to bottom, rgba(255,255,255,.05), transparent 75%);
}

.hero-title{
  font-family:"Reggae One";
  font-size:clamp(2.2rem,7vw,5rem);
  margin:0;
  letter-spacing:.5px;
}

.hero-sub{
  margin-top:8px;
  color:var(--muted);
}

.top-ad{ max-width:1100px; margin:18px auto 0; }

.ad-slot{
  border:1px dashed rgba(255,255,255,.25);
  padding:16px;
  text-align:center;
  border-radius:14px;
  background:rgba(255,255,255,.05);
  color:var(--muted);
}

.layout{
  display:grid;
  grid-template-columns:var(--railW) 1fr var(--railW);
  gap:var(--gap);
  max-width:1500px;
  margin:auto;
  padding:18px;
}

.center{ max-width:1100px; margin:auto; width:100%; }

.rail{
  position:sticky;
  top:80px;
}

details{
  margin:16px 0;
  border-radius:var(--radius);
  overflow:hidden;
  border:2px solid var(--stroke);
  background:linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.04));
  box-shadow:var(--shadow);
  backdrop-filter: blur(8px);
}

summary{
  cursor:pointer;
  padding:14px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:12px;
}

summary::-webkit-details-marker{ display:none; }

.leftstack{ text-align:left; }

.doc{
  font-weight:800;
  letter-spacing:.3px;
  line-height:1.15;
}

.id{
  font-size:12px;
  color:var(--muted);
  font-family:monospace;
  margin-top:6px;
}

.actions{
  display:flex;
  gap:8px;
  align-items:center;
}

.pill{
  background:rgba(255,255,255,.10);
  border:1px solid rgba(255,255,255,.12);
  padding:7px 10px;
  border-radius:999px;
  font-size:12px;
  text-decoration:none;
  color:white;
  white-space:nowrap;
  transition:transform .12s ease, background .12s ease;
}

.pill:hover{
  background:rgba(255,255,255,.16);
  transform:translateY(-1px);
}

.pill.primary{
  background:rgba(255,255,255,.14);
  border-color:rgba(255,255,255,.18);
}

.pill.ghost{
  background:transparent;
}

.chev{
  display:inline-block;
  width:10px;
  height:10px;
  border-right:2px solid rgba(255,255,255,.7);
  border-bottom:2px solid rgba(255,255,255,.7);
  transform:rotate(-45deg);
  margin-left:8px;
  opacity:.85;
}

details[open] .chev{
  transform:rotate(45deg);
  margin-top:-2px;
}

.content{
  background:#000;
  border-top:1px solid rgba(255,255,255,.10);
}

iframe{
  width:100%;
  height:85vh;
  border:0;
}

.between-ad{ margin:14px 0; }

.nav{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  padding:12px;
  border-bottom:1px solid var(--stroke);
  justify-content:center;
}

.nav a{
  text-decoration:none;
  padding:6px 12px;
  background:rgba(255,255,255,.07);
  border-radius:999px;
  color:white;
  font-size:13px;
}

.toolbar{
  max-width:1100px;
  margin:16px auto 0;
  padding:0 16px;
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  align-items:center;
  justify-content:center;
}

.search{
  width:min(760px, 100%);
  display:flex;
  gap:10px;
  align-items:center;
  padding:10px 12px;
  border-radius:999px;
  border:1px solid var(--stroke);
  background:rgba(255,255,255,.05);
}

.search input{
  width:100%;
  background:transparent;
  border:0;
  outline:0;
  color:var(--ink);
  font-size:14px;
}

.kbd{
  font-size:12px;
  color:var(--muted);
  border:1px solid rgba(255,255,255,.18);
  padding:3px 8px;
  border-radius:999px;
}

.smallbtn{
  border:1px solid rgba(255,255,255,.18);
  background:rgba(255,255,255,.06);
  color:var(--ink);
  padding:8px 12px;
  border-radius:999px;
  cursor:pointer;
  font-size:13px;
  transition:transform .12s ease, background .12s ease;
}

.smallbtn:hover{
  background:rgba(255,255,255,.1);
  transform:translateY(-1px);
}

.meta{
  color:var(--muted);
  font-size:12px;
  text-align:center;
  margin:10px 0 0;
}

@media(max-width:1100px){
  .layout{ grid-template-columns:1fr; }
  .rail{ position:relative; top:auto; }
}
</style>
</head>

<body>

<header class="hero">
  <h1 class="hero-title">Full Manga Series</h1>
  <p class="hero-sub">Search • Expand • Read</p>

  <div class="toolbar">
    <div class="search">
      <input id="q" type="search" placeholder="Search titles… e.g. dragon ball 12, dbz chapter 200, piccolo…" autocomplete="off" />
      <span class="kbd">Enter</span>
    </div>
    <button class="smallbtn" id="clear">Clear</button>
    <button class="smallbtn" id="openFirst">Open First</button>
  </div>

  <div class="meta" id="meta"></div>

  <div class="top-ad">
    <div class="ad-slot">TOP AD SLOT</div>
  </div>
</header>

<nav class="nav" id="nav" style="display:none;"></nav>

<div class="layout">
  <aside class="rail"><div class="ad-slot">LEFT AD</div></aside>
  <main class="center"><div id="container"></div></main>
  <aside class="rail"><div class="ad-slot">RIGHT AD</div></aside>
</div>

<script>
/* ========= SETTINGS ========= */

// Local text file name
// Put this next to index.html in the repo
const DATA_FILE = "drive_files.txt";

// If you want to show an ad between entries
const AD_EVERY = 1; // 1 = between every entry (your current behavior). Set to 0 to disable.

/* ============================ */

function escapeHtml(s){
  return String(s)
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;")
    .replaceAll("'","&#39;");
}

function makeAd(){
  const div=document.createElement("div");
  div.className="between-ad";
  div.innerHTML='<div class="ad-slot">AD SLOT</div>';
  return div;
}

// Extract a chapter number from common title patterns.
// Returns a number; if nothing found returns Infinity so it sinks.
function extractChapterNumber(title){
  const t = (title || "").toLowerCase();

  // "chapter 203" / "chapter: 203"
  let m = t.match(/\bchapter\D{0,8}(\d{1,5})\b/);
  if(m) return parseInt(m[1], 10);

  // "ch 203"
  m = t.match(/\bch\D{0,8}(\d{1,5})\b/);
  if(m) return parseInt(m[1], 10);

  // "vol 12" (optional)
  m = t.match(/\bvol(?:ume)?\D{0,8}(\d{1,4})\b/);
  if(m) return parseInt(m[1], 10);

  // "Dragon Ball 12.pdf" -> picks 12
  m = t.match(/\b(\d{1,5})\b/);
  if(m) return parseInt(m[1], 10);

  return Infinity;
}

// Parse drive_files.txt lines.
// Supported:
///  FILE_ID | Title
///  FILE_ID
function parseDriveFileText(txt){
  const lines = txt.split(/\r?\n/).map(l => l.trim()).filter(Boolean);
  const items = [];

  for(const line of lines){
    // allow "id | title" with any spacing around |
    const parts = line.split("|");
    const id = (parts[0] || "").trim();
    const title = parts.slice(1).join("|").trim(); // keep extra pipes in title if any

    if(!id) continue;

    items.push({
      id,
      title: title || ""
    });
  }

  return items;
}

function normalizeTitle(item, index){
  // If title missing, display as Chapter N (1-based)
  if(item.title && item.title.trim()) return item.title.trim();
  return `Chapter ${index + 1}`;
}

function sortNumerically(items){
  return [...items].sort((a,b) => {
    const an = extractChapterNumber(a.title);
    const bn = extractChapterNumber(b.title);
    if(an !== bn) return an - bn;

    // tie break by title
    const at = (a.title || "").toLowerCase();
    const bt = (b.title || "").toLowerCase();
    if(at < bt) return -1;
    if(at > bt) return 1;

    // final tie by id
    return String(a.id||"").localeCompare(String(b.id||""));
  });
}

function filterItems(items, q){
  if(!q) return items;
  const needle = q.toLowerCase();
  return items.filter(it => {
    const hay = `${it.id} ${it.title || ""}`.toLowerCase();
    return hay.includes(needle);
  });
}

function makeCard(item, displayIndex){
  const id = item.id;
  const title = normalizeTitle(item, displayIndex);
  const src = `https://drive.google.com/file/d/${id}/preview`;

  const d = document.createElement("details");

  d.innerHTML = `
    <summary>
      <div class="leftstack">
        <div class="doc">${escapeHtml(title)}</div>
        <div class="id">${escapeHtml(id)}</div>
      </div>

      <div class="actions">
        <span class="pill primary expandPill">EXPAND <span class="chev"></span></span>
        <a class="pill" target="_blank" rel="noopener" href="${src}">OPEN</a>
      </div>
    </summary>

    <div class="content">
      <iframe loading="lazy" src="${src}"></iframe>
    </div>
  `;

  // Make the EXPAND pill toggle the details (more obvious than clicking summary)
  const pill = d.querySelector(".expandPill");
  pill.addEventListener("click", (e) => {
    e.preventDefault();
    e.stopPropagation();
    d.open = !d.open;
  });

  return d;
}

function setMeta(text){
  document.getElementById("meta").textContent = text || "";
}

async function loadAllItems(){
  const res = await fetch(DATA_FILE, { cache: "no-store" });
  if(!res.ok){
    throw new Error(`Could not load ${DATA_FILE} (${res.status})`);
  }
  const txt = await res.text();
  return parseDriveFileText(txt);
}

function openFirstVisible(){
  const first = document.querySelector("#container details");
  if(first){
    first.open = true;
    first.scrollIntoView({ behavior:"smooth", block:"start" });
  }
}

async function render(){
  const container = document.getElementById("container");
  container.innerHTML = "";

  const q = document.getElementById("q").value.trim();

  try{
    // load everything once
    const all = await loadAllItems();

    // filter + sort
    const filtered = filterItems(all, q);
    const sorted = sortNumerically(filtered);

    setMeta(`${sorted.length.toLocaleString()} result(s) • sorted by extracted chapter number`);

    if(!sorted.length){
      const empty = document.createElement("div");
      empty.className = "ad-slot";
      empty.textContent = "No matches. Try fewer words or just a number (e.g. 12, 203).";
      container.appendChild(empty);
      return;
    }

    sorted.forEach((item, i) => {
      container.appendChild(makeCard(item, i));
      if(AD_EVERY && i < sorted.length - 1){
        container.appendChild(makeAd());
      }
    });

    // auto-open first item so users instantly understand "expand"
    openFirstVisible();

  }catch(err){
    setMeta("");
    const box = document.createElement("div");
    box.className = "ad-slot";
    box.textContent = "Failed to load: " + (err?.message || String(err));
    container.appendChild(box);

    const hint = document.createElement("div");
    hint.className = "ad-slot";
    hint.style.marginTop = "12px";
    hint.textContent = `Make sure ${DATA_FILE} is in the same folder as index.html and contains lines like: FILE_ID | Title`;
    container.appendChild(hint);
  }
}

function wireUI(){
  const input = document.getElementById("q");
  const clear = document.getElementById("clear");
  const openFirst = document.getElementById("openFirst");

  input.addEventListener("keydown", (e) => {
    if(e.key === "Enter"){
      render();
    }
  });

  clear.addEventListener("click", () => {
    input.value = "";
    render();
  });

  openFirst.addEventListener("click", () => {
    openFirstVisible();
  });

  // optional: live filtering (feels slick). comment out if you prefer Enter only.
  input.addEventListener("input", () => {
    // tiny debounce
    window.clearTimeout(window.__t);
    window.__t = window.setTimeout(render, 120);
  });
}

wireUI();
render();
</script>

</body>
</html>
